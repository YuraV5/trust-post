name: Checks

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write .env.test
        run: |
          cat > .env.test <<'EOF'
          ${{ secrets.ENV_TEST }}
          EOF

      - name: E2E tests (testcontainers)
        run: npm run test:e2e
        env:
          TESTCONTAINERS_RYUK_DISABLED: true
          LOGGER_CONSOLE_ENABLED: 'true'
          LOGGER_LEVEL: 'debug'

  docker-build:
    runs-on: ubuntu-latest
    needs: e2e
    # Only verify Docker build when targeting main (release/hotfix PRs)
    if: github.base_ref == 'main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: trust-post:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max