services:
  frontend:
    image: ${DOCKERHUB_USERNAME}/trust-front:latest
    container_name: trust_front_web
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  app:
    image: ${DOCKERHUB_USERNAME}/trust-post:latest
    container_name: trust_post_full_app
    env_file:
      - ../../.env
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-trust_post_full_stack_redis}
      LOGGER_FILE_ENABLED: "true"
      CORS_ALLOW_ORIGIN: ${FULL_STACK_PUBLIC_URL:-http://localhost}
      WS_CORS_ALLOW_ORIGIN: ${FULL_STACK_PUBLIC_URL:-http://localhost}
      FRONTEND_URL: ${FULL_STACK_PUBLIC_URL:-http://localhost}
      SERVICE_URL: ${FULL_STACK_SERVICE_URL:-http://localhost/api/v1}
      GOOGLE_OAUTH_CALLBACK_URL: ${GOOGLE_OAUTH_CALLBACK_URL:-http://localhost:3001/api/v1/auth/google/callback}
    volumes:
      - ../../logs:/usr/src/app/logs
      - ../../tools/imgs.json:/usr/src/app/tools/imgs.json:ro
      - ../../tools/imgs.json:/usr/src/app/dist/tools/imgs.json:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/health/liveness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: trust_post_full_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: trust_post_full_redis
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-trust_post_full_stack_redis}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-trust_post_full_stack_redis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: trust_post_full_postgres_exporter
    profiles: ["monitoring"]
    environment:
      DATA_SOURCE_NAME: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: trust_post_full_redis_exporter
    profiles: ["monitoring"]
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-trust_post_full_stack_redis}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: trust_post_full_node_exporter
    profiles: ["monitoring"]
    ports:
      - "9100:9100"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: trust_post_full_prometheus
    profiles: ["monitoring"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ../../monitoring/prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - ../../monitoring/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheusdata:/prometheus
    depends_on:
      app:
        condition: service_started
      alertmanager:
        condition: service_started
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: trust_post_full_alertmanager
    profiles: ["monitoring"]
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ../../monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanagerdata:/alertmanager
    restart: unless-stopped

  loki:
    image: grafana/loki:3.1.1
    container_name: trust_post_full_loki
    profiles: ["monitoring"]
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ../../monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - lokidata:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.1.1
    container_name: trust_post_full_promtail
    profiles: ["monitoring"]
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ../../monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - ../../logs:/var/log/trust-post:ro
      - promtailpositions:/tmp
    depends_on:
      loki:
        condition: service_started
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.4
    container_name: trust_post_full_grafana
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafanadata:/var/lib/grafana
      - ../../monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../../monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  prometheusdata:
  alertmanagerdata:
  grafanadata:
  lokidata:
  promtailpositions: