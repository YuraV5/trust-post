name: Build & Push Docker Image

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      # Version bump is controlled by keywords in commit messages or PR title:
      #   #major  → v1.0.0 → v2.0.0
      #   #minor  → v1.0.0 → v1.1.0
      #   #patch  → v1.0.0 → v1.0.1  (default if no keyword found)
      - name: Bump version tag
        id: tag
        uses: anothrNick/github-tag-action@1.73.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_PREFIX: v
          DEFAULT_BUMP: patch
          WITH_V: true
          VERBOSE: true

  docker:
    needs: tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/trust-post:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/trust-post:${{ needs.tag.outputs.new_tag }}
          labels: |
            org.opencontainers.image.version=${{ needs.tag.outputs.new_tag }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            branch=${{ github.event.pull_request.head.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max