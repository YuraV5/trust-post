name: Full Check

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint:check

  format:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run format:check

  unit-test:
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test

  e2e:
    runs-on: ubuntu-latest
    needs: unit-test
    environment: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Write .env.test
        run: |
          if [ -z "${{ secrets.ENV_TEST }}" ]; then
            echo "ENV_TEST secret is empty or unavailable for this workflow run."
            echo "Check repository/environment secrets and PR source restrictions."
            exit 1
          fi
          printf "%s" "${{ secrets.ENV_TEST }}" > .env.test
      - run: npm run test:e2e
        env:
          TESTCONTAINERS_RYUK_DISABLED: true
          LOGGER_CONSOLE_ENABLED: 'true'
          LOGGER_LEVEL: 'debug'

  docker-build:
    runs-on: ubuntu-latest
    needs: e2e
    # Only verify Docker build when targeting main (release/hotfix PRs)
    if: github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max