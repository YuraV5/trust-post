name: Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format -- --check

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: trust-post-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  tag:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next SemVer tag from commits
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          LAST_TAG=$(git tag -l 'v*.*.*' --sort=-version:refname | head -n 1)
          if [ -z "${LAST_TAG}" ]; then
            LAST_TAG="v0.0.0"
          fi

          if git rev-parse "${LAST_TAG}" >/dev/null 2>&1; then
            COMMITS=$(git log --format=%B "${LAST_TAG}..HEAD")
          else
            COMMITS=$(git log --format=%B)
          fi

          BUMP=patch
          if echo "${COMMITS}" | grep -Eiq '(^|[[:space:]])#major([[:space:]]|$)|(^|[[:space:]])\[major\]([[:space:]]|$)|BREAKING CHANGE'; then
            BUMP=major
          elif echo "${COMMITS}" | grep -Eiq '(^|[[:space:]])#minor([[:space:]]|$)|(^|[[:space:]])\[minor\]([[:space:]]|$)|^feat(\(.+\))?:'; then
            BUMP=minor
          elif echo "${COMMITS}" | grep -Eiq '(^|[[:space:]])#patch([[:space:]]|$)|(^|[[:space:]])\[patch\]([[:space:]]|$)|^fix(\(.+\))?:'; then
            BUMP=patch
          fi

          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION}"

          case "${BUMP}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "next_tag=${NEXT_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.bump.outputs.next_tag }}"
          git push origin "${{ steps.bump.outputs.next_tag }}"
        
      
