name: Build & Push Docker Image

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main

jobs:
  docker:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine next SemVer tag from commits
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          LAST_TAG=$(git tag -l 'v*.*.*' --sort=-version:refname | head -n 1)
          if [ -z "${LAST_TAG}" ]; then
            LAST_TAG="v0.0.0"
          fi

          if git rev-parse "${LAST_TAG}" >/dev/null 2>&1; then
            COMMITS=$(git log --format=%B "${LAST_TAG}..HEAD")
          else
            COMMITS=$(git log --format=%B)
          fi

          if [ -z "$(echo "${COMMITS}" | tr -d '[:space:]')" ]; then
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
            echo "next_tag=${LAST_TAG}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP=patch
          if echo "${COMMITS}" | grep -Eiq '(^|[[:space:]])#major([[:space:]]|$)|(^|[[:space:]])\[major\]([[:space:]]|$)|BREAKING CHANGE'; then
            BUMP=major
          elif echo "${COMMITS}" | grep -Eiq '(^|[[:space:]])#minor([[:space:]]|$)|(^|[[:space:]])\[minor\]([[:space:]]|$)|^feat(\(.+\))?:'; then
            BUMP=minor
          elif echo "${COMMITS}" | grep -Eiq '(^|[[:space:]])#patch([[:space:]]|$)|(^|[[:space:]])\[patch\]([[:space:]]|$)|^fix(\(.+\))?:'; then
            BUMP=patch
          fi

          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION}"

          case "${BUMP}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          BRANCH_SAFE=$(echo "${GITHUB_REF_NAME}" | tr '/' '_' | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG="${BRANCH_SAFE}_${NEXT_TAG}"

          echo "bump=${BUMP}" >> "$GITHUB_OUTPUT"
          echo "next_tag=${NEXT_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

          if git rev-parse "${NEXT_TAG}" >/dev/null 2>&1; then
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
          else
            echo "create_tag=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.bump.outputs.create_tag == 'true'
        shell: bash
        run: |
          set -euo pipefail

          npm version "${{ steps.bump.outputs.bump }}" --no-git-tag-version

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json package-lock.json
          git commit -m "chore(release): ${{ steps.bump.outputs.next_tag }}"
          git push origin HEAD:main

          git tag "${{ steps.bump.outputs.next_tag }}"
          git push origin "${{ steps.bump.outputs.next_tag }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/trust-post:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/trust-post:${{ steps.bump.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
