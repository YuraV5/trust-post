auth_enabled: false

# Loki HTTP API endpoint.
server:
  http_listen_port: 3100

# Single-node mode for local/dev.
common:
  path_prefix: /loki
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules

schema_config:
  configs:
    - from: 2024-01-01
      # TSDB + filesystem is enough for local and small setups.
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Reject very old log entries (useful when clocks drift or old files are ingested).
  reject_old_samples: true
  reject_old_samples_max_age: 168h

analytics:
  reporting_enabled: false

ruler:
  alertmanager_url: http://alertmanager:9093
