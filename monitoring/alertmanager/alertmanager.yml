global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity", "team"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  receiver: dev-null

  # Future routing example (uncomment when integrations are added):
  # routes:
  #   - matchers:
  #       - severity="critical"
  #     receiver: slack
  #   - matchers:
  #       - team="backend"
  #     receiver: telegram

receivers:
  - name: dev-null

  # Placeholders for phase 3 integration.
  # Add slack_configs/webhook_configs here when ready.
  - name: slack

  - name: telegram

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ["alertname", "team"]
