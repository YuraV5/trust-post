name: Build & Push Docker Image

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # ── Runs on PR: calculates the next SemVer and tags the branch ───────────────
  tag-pr-branch:
    if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Determine next SemVer tag from PR commits
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force
          git fetch origin main

          LAST_TAG=$(git tag -l 'v*.*.*' --sort=-version:refname | head -n 1)
          [ -z "${LAST_TAG}" ] && LAST_TAG="v0.0.0"

          # Only look at commits that are new on this branch vs main
          COMMITS=$(git log --format=%B "origin/main..HEAD")

          if [ -z "$(echo "${COMMITS}" | tr -d '[:space:]')" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "next_tag=${LAST_TAG}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Bump rules (only one level, take the highest found):
          #   #major / [major] / BREAKING CHANGE / feat: → bump MINOR (v1.0.0 → v1.1.0)
          #   everything else                             → bump PATCH  (v1.0.0 → v1.0.1)
          BUMP=patch
          if echo "${COMMITS}" | grep -Eiq \
            '(^|[[:space:]])#major([[:space:]]|$)|(^|[[:space:]])\[major\]([[:space:]]|$)|BREAKING CHANGE|^feat(\(.+\))?:'; then
            BUMP=minor
          fi

          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION}"

          case "${BUMP}" in
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          BRANCH_SAFE=$(echo "${{ github.head_ref }}" | tr '/' '_' | tr '[:upper:]' '[:lower:]')
          COMBINED_TAG="${BRANCH_SAFE}_${NEXT_TAG}"

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "next_tag=${NEXT_TAG}" >> "$GITHUB_OUTPUT"
          echo "combined_tag=${COMBINED_TAG}" >> "$GITHUB_OUTPUT"

      - name: Assign combined tag to PR branch
        if: steps.bump.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          COMBINED_TAG="${{ steps.bump.outputs.combined_tag }}"

          # Remove old tag of the same name on re-runs (PR synchronize event)
          git tag -d "${COMBINED_TAG}" 2>/dev/null || true
          git push origin ":refs/tags/${COMBINED_TAG}" 2>/dev/null || true

          git tag "${COMBINED_TAG}"
          git push origin "${COMBINED_TAG}"

  # ── Runs on push to main: reads branch tag, builds and publishes image ────────
  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve merged branch name and version tag
        id: info
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          # ── Extract merged branch name from the merge commit message ─────────
          MERGE_MSG=$(git log -1 --format=%B HEAD)
          BRANCH=""

          # Standard GitHub merge: "Merge pull request #N from org/branch-name"
          BRANCH=$(echo "${MERGE_MSG}" | grep -oP 'from [^[:space:]]+/\K[^\n]+' | head -1 || true)

          # Squash merge: commit subject is usually "feature-name (#N)"
          if [ -z "${BRANCH}" ]; then
            BRANCH=$(echo "${MERGE_MSG}" | head -1 | sed -E 's/ \(#[0-9]+\)$//' | tr -d '\r\n')
          fi

          BRANCH_SAFE=$(echo "${BRANCH}" | tr '/' '_' | tr '[:upper:]' '[:lower:]' | tr -d '\r\n')

          # ── Find the combined tag assigned to this branch during the PR ──────
          MERGED_SHA=$(git rev-parse HEAD^2 2>/dev/null || echo "")
          COMBINED_TAG=""

          if [ -n "${MERGED_SHA}" ]; then
            COMBINED_TAG=$(git tag --points-at "${MERGED_SHA}" -l "${BRANCH_SAFE}_v*.*.*" \
              | sort -V | tail -1 || true)
          fi

          # Fallback: search all tags with the branch-safe prefix
          if [ -z "${COMBINED_TAG}" ] && [ -n "${BRANCH_SAFE}" ]; then
            COMBINED_TAG=$(git tag -l "${BRANCH_SAFE}_v*.*.*" --sort=-version:refname \
              | head -1 || true)
          fi

          # Last resort: use latest plain semver tag
          if [ -z "${COMBINED_TAG}" ]; then
            FALLBACK=$(git tag -l 'v*.*.*' --sort=-version:refname | head -1 || true)
            COMBINED_TAG="${BRANCH_SAFE:+${BRANCH_SAFE}_}${FALLBACK:-v0.0.1}"
          fi

          # Extract the semver part (e.g. "v1.2.5") from the combined tag
          VERSION_TAG=$(echo "${COMBINED_TAG}" | grep -oP 'v\d+\.\d+\.\d+' | tail -1)
          VERSION_TAG="${VERSION_TAG:-v0.0.1}"

          echo "image_tag=${COMBINED_TAG}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"

      - name: Update package.json and create release tag
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.info.outputs.version_tag }}"
          VERSION="${VERSION#v}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          npm version "${VERSION}" --no-git-tag-version --allow-same-version

          git add package.json package-lock.json
          git diff --staged --quiet || git commit -m "chore(release): ${{ steps.info.outputs.version_tag }}"
          git push origin HEAD:main

          # Create plain semver tag on the current HEAD and push
          git tag "${{ steps.info.outputs.version_tag }}" 2>/dev/null || true
          git push origin "${{ steps.info.outputs.version_tag }}" 2>/dev/null || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/trust-post:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/trust-post:${{ steps.info.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.version_tag }}
          name: Release ${{ steps.info.outputs.version_tag }}
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
